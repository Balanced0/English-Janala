<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Janala | Best Platform for learning English</title>
    <link rel="shortcut icon" href="./assets/logo.png" alt="page-logo" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- DaisyUI + Tailwind-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="navbar bg-base-100 shadow-sm bg-[#BADEFF]/40">
          <div class="container mx-auto flex px-4">
            <div class="navbar-start">
              <div class="dropdown">
                <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-5 w-5"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M4 6h16M4 12h8m-8 6h16"
                    />
                  </svg>
                </div>
                <ul
                  tabindex="-1"
                  class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
                >
                  <li>
                    <a><i class="fa-solid fa-circle-question"></i> FAQ</a>
                  </li>
                  <li>
                    <a><i class="fa-solid fa-book-open"></i> Learn</a>
                  </li>
                  <li>
                    <a
                      ><i class="fa-solid fa-arrow-right-from-bracket"></i>
                      Logout</a
                    >
                  </li>
                </ul>
              </div>
              <a class="text-xl flex items-center gap-2">
                <span class="font-semibold">English</span>
                <div>
                  <img src="./assets/logo.png" alt="page-logo" />
                </div>
                <span class="font-bangla">জানালা</span>
              </a>
            </div>
            <div class="navbar-end hidden lg:flex">
              <ul class="menu menu-horizontal px-1 gap-4">
                <li>
                  <a class="btn btn-outline btn-primary"
                    ><i class="fa-solid fa-circle-question"></i> FAQ</a
                  >
                </li>
                <li>
                  <a class="btn btn-outline btn-primary"
                    ><i class="fa-solid fa-book-open"></i> Learn</a
                  >
                </li>
                <li>
                  <a class="btn btn-outline btn-primary"
                    ><i class="fa-solid fa-arrow-right-from-bracket"></i>
                    Logout</a
                  >
                </li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
      <section class="container mx-auto flex flex-col-reverse items-center mt-[49px] gap-64 px-4 md:flex-row">
        <div class="content flex-1 text-center md:text-left">
          <div>
            <h3 class="text-5xl font-bold">
              <span class="text-[#00BCFF]">English</span> is Easy!!
            </h3>
            <p class="font-bangla text-2xl font-medium mb-[27px] mt-[24px]">
              আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
              আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে
              যাবে অন্য একটি Level এ
            </p>
          </div>
          <div>
            <fieldset class="fieldset flex flex-col items-center md:items-start">
              <input type="text" class="input mb-[20px]" placeholder="Enter Your Name" />
              <input type="password" class="input mb-[20px]" placeholder="*******" />
              <button class="btn btn-primary max-w-28 whitespace-nowrap">Get Started</button>
            </fieldset>
          </div>
        </div>
        <div class="image flex-1">
          <img src="./assets/hero-student.png" alt="hero student" />
        </div>
      </section>
    </header>
  </body>
</html>
